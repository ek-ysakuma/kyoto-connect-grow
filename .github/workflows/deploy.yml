name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Lovableのデフォルトブランチ名に合わせてください

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          # npm ci から npm install に変更し、package-lock.json がなくてもインストールできるようにします
          npm install
          # 型エラーなどをすべて無視して、何が何でもdistフォルダを強制ビルドするコマンド
          npm run build -- --emptyOutDir || npx vite build --emptyOutDir

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # ビルドされた静的ファイルがあるフォルダ
          branch: gh-pages # デプロイ先のブランチ
