name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 💡 もしブランチ名が master の場合はここを master に書き換えてください

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install Dependencies 🔧
        run: npm install

      - name: Force Build Web Site 🚀
        # Viteを直接呼び出して、型エラーや警告を完全に無視してdistフォルダへ強制出力させます
        run: npx vite build --outDir dist --emptyOutDir

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # ビルドされた静的ファイルがあるフォルダ
          branch: gh-pages # デプロイ先のブランチ
