name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# GitHub Pagesへのデプロイに必要な権限を明示的に設定します
permissions:
  contents: read
  pages: write
  id-token: write

# 同時に実行されるデプロイをキャンセルし、最新のコミットだけを優先します
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install Dependencies 🔧
        run: npm install

      - name: Force Build Web Site 🚀
        run: NITRO_PRESET=github-pages NITRO_STATIC=true npm run build

      - name: Setup Pages ⚙️
        uses: actions/configure-pages@v5

      - name: Upload Artifact 📤
        # 生成された .output/public フォルダを GitHub Pages 用にパッケージングしてアップロードします
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.output/public'

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
