name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install Dependencies 🔧
        run: npm install

      - name: Project Standard Build 🚀
        run: npm run build

      - name: Debug Folder Structure 🔍
        # ビルド後にどんなフォルダやファイルができているかログに出力します
        run: |
          echo "=== Root Folder ==="
          ls -la
          echo "=== .output Folder (if exists) ==="
          ls -R .output || echo ".output not found"
          echo "=== dist Folder (if exists) ==="
          ls -R dist || echo "dist not found"

      - name: Upload Artifact 📦
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.output/public' # 一旦このまま動かします

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
