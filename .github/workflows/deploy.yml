name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 💡 もしブランチ名が master の場合は master に書き換えてください

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install Dependencies 🔧
        run: npm install

      - name: Force Build Web Site 🚀
        # 型チェックなどを無視して強制ビルドを実行します
        run: npx vite build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # ビルド結果が生成される「.output」フォルダを指定します
          folder: .output
          branch: gh-pages # デプロイ先のブランチ
