name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install Dependencies 🔧
        run: npm install

      - name: Project Static SSG Build 🚀
        # 環境変数を付与してビルドし、SSRではなく全てのページをHTML（静的ファイル）として生成させます
        env:
          NITRO_PRESET: github-pages
        run: npm run build

      - name: Upload Artifact 📦
        # 静的生成された場合は、.output/public の中に index.html 等が生成されます
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.output/public'

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
