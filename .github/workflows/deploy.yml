name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install Dependencies 🔧
        run: npm install

      - name: Build Static Site 🚀
        # プリレンダリングを強制し、SSRビルド側のHTMLエラーを回避する環境変数です
        run: npx vinxi build
        env:
          NITRO_PRESET: github-pages

      - name: Move Output to Dist 📂
        # 生成された静的ファイルを、デプロイアクションが見に行く 'dist' にコピーします
        run: |
          mkdir -p dist
          cp -r .output/public/* dist/

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
